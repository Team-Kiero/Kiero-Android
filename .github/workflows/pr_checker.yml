name: Android PR Checker (CI)

on:
  pull_request:
    branches: [ develop, main ]
  push:
    branches: [ develop ]

  workflow_dispatch:
jobs:
  build-check:
    name: Build & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: 'gradle' # 빌드 속도를 높이기 위한 캐시 활성화

      - name: Set up Android SDK
        uses: android-actions/setup-android@v4

      - name: Restore debug keystore
        run: |
          mkdir -p /home/runner/.android
          echo "${{ secrets.DEBUG_KEYSTORE }}" | base64 --decode > /home/runner/.android/debug.keystore    

      # 빌드를 위해 gradle에 선언된 키들을 설정 , printf는 출력이 아닌 파일 생성용이라 안전
      - name: Create local.properties from secret
        env:
          LOCAL_PROPERTIES: ${{ secrets.LOCAL_PROPERTIES }}
        run: |
          printf "%s" "$LOCAL_PROPERTIES" > local.properties 
          echo "sdk.dir=$ANDROID_HOME" >> local.properties      

      - name: Grant permission to gradlew
        run: chmod +x ./gradlew

      - name: Build with Gradle
        # 단순히 빌드만 확인하려면 assembleDebug, 테스트(ktlint 등)까지 돌리려면 check 사용
        run: ./gradlew assembleDebug --stacktrace --no-daemon
